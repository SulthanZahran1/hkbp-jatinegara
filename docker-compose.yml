services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: hkbp-app
    restart: unless-stopped
    environment:
      PORT: 8080
      SQLITE_PATH: /app/data/hkbp_jatinegara.db
      APP_BASE_URL: https://hkbp.zahranm.cloud
      OIDC_ISSUER: https://auth.hkbp.zahranm.cloud/oauth2
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-hkbp-app}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      IDP_ADMIN_BASE_URL: https://auth.hkbp.zahranm.cloud
      IDP_ADMIN_TOKEN: ${IDP_ADMIN_TOKEN}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      STATIC_DIR: /app/frontend/dist
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: 5242880
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
    networks:
      - web
    expose:
      - "8080"

  turso:
    image: ghcr.io/tursodatabase/libsql-server:latest
    platform: linux/amd64
    environment:
      SQLD_NODE: primary
      SQLD_DB_PATH: /var/lib/sqld/hkbp-jatinegara.db
      SQLD_HTTP_LISTEN_ADDR: 0.0.0.0:8080
      SQLD_GRPC_LISTEN_ADDR: 0.0.0.0:5001
    ports:
      - "8081:8080"
      - "5002:5001"
    volumes:
      - turso-data:/var/lib/sqld

volumes:
  app-data:
  app-uploads:
  turso-data:

networks:
  web:
    external: true
